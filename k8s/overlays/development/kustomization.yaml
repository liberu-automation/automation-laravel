apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: liberu-automation

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: liberu-automation

configMapGenerator:
  - name: liberu-automation-config
    behavior: merge
    literals:
      - APP_ENV=local
      - APP_DEBUG=true
      - LOG_LEVEL=debug

images:
  - name: ghcr.io/liberu-automation/automation-laravel
    newTag: latest
