apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: liberu-automation
  namespace: liberu-automation
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: liberu-automation
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
