apiVersion: apps/v1
kind: Deployment
metadata:
  name: liberu-automation
  namespace: liberu-automation
  labels:
    app: liberu-automation
    component: application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: liberu-automation
      component: application
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: liberu-automation
        component: application
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z mysql 3306; do
                echo "Waiting for MySQL..."
                sleep 3
              done
              echo "MySQL is ready."
        - name: migrations
          image: ghcr.io/liberu-automation/automation-laravel:latest
          command:
            - sh
            - -c
            - |
              php artisan migrate --force
              php artisan config:cache
              php artisan route:cache
              php artisan view:cache
          envFrom:
            - configMapRef:
                name: liberu-automation-config
            - secretRef:
                name: liberu-automation-secret
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage
      containers:
        - name: php-fpm
          image: ghcr.io/liberu-automation/automation-laravel:latest
          ports:
            - containerPort: 9000
          envFrom:
            - configMapRef:
                name: liberu-automation-config
            - secretRef:
                name: liberu-automation-secret
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage
            - name: cache
              mountPath: /var/www/html/bootstrap/cache
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /up
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /up
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /up
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
            - name: storage
              mountPath: /var/www/html/storage
              readOnly: true
            - name: cache
              mountPath: /var/www/html/bootstrap/cache
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /up
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /up
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: liberu-automation-storage
        - name: cache
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: nginx-config
