apiVersion: v1
kind: ConfigMap
metadata:
  name: liberu-automation-config
  namespace: liberu-automation
data:
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: "http://localhost:8000"
  CACHE_DRIVER: redis
  SESSION_DRIVER: redis
  QUEUE_CONNECTION: redis
  DATABASE_URL: "mysql://liberu:secret@mysql:3306/liberu"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  MAIL_DRIVER: mailpit
  MAIL_HOST: mailpit
  MAIL_PORT: "1025"
  LOG_CHANNEL: stack
  LOG_LEVEL: debug
