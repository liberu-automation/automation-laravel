apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: liberu-automation-network-policy
  namespace: liberu-automation
spec:
  podSelector:
    matchLabels:
      app: liberu-automation
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app: liberu-automation
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 9000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: liberu-automation
    - to:
        - podSelector:
            matchLabels:
              app: mysql
      ports:
        - protocol: TCP
          port: 3306
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS for external API calls
    - ports:
        - protocol: TCP
          port: 443
